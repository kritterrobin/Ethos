<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0a06;--parchment:#f5eddc;--gold:#c8a951;
  --gold-pale:rgba(200,169,81,0.14);--gold-dim:rgba(200,169,81,0.28);
  --ember:#c0392b;--border:rgba(200,169,81,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;background:var(--ink);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(200,169,81,0.06) 0%,transparent 60%);}
.app{position:relative;z-index:1;max-width:460px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;padding-bottom:50px;}
.hdr{text-align:center;padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,10vw,3.4rem);
  color:var(--gold);letter-spacing:0.4em;line-height:1;text-shadow:0 0 40px rgba(200,169,81,0.15);}
.byline{font-family:'DM Mono',monospace;font-size:0.68rem;
  color:rgba(200,169,81,0.35);letter-spacing:0.2em;margin-top:3px;}
.screen{display:none;padding:14px 16px;}
.screen.active{display:block;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.setup-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;
  color:var(--parchment);text-align:center;margin:6px 0 4px;}
.setup-sub{font-family:'DM Mono',monospace;font-size:0.72rem;
  color:rgba(245,237,220,0.28);text-align:center;letter-spacing:0.12em;margin-bottom:18px;}
.lbl{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--gold);
  letter-spacing:0.16em;display:block;margin-bottom:6px;}
.pick-row{display:flex;gap:7px;margin-bottom:18px;}
.popt{flex:1;background:rgba(200,169,81,0.03);border:1px solid var(--border);
  border-radius:5px;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.14s;}
.popt.on{border-color:var(--gold);background:var(--gold-pale);}
.popt-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);
  letter-spacing:0.08em;display:block;line-height:1;}
.popt-lbl{font-family:'DM Mono',monospace;font-size:0.68rem;
  color:rgba(245,237,220,0.3);letter-spacing:0.06em;display:block;margin-top:2px;}
.finput{width:100%;background:rgba(200,169,81,0.04);border:1px solid var(--border);
  color:var(--parchment);padding:10px 12px;font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;border-radius:4px;outline:none;margin-bottom:10px;
  transition:border-color 0.2s;-webkit-appearance:none;}
.finput:focus{border-color:var(--gold);}
.finput.error{border-color:var(--ember);}
.name-fields{margin-bottom:18px;}
.btn{display:block;width:100%;background:var(--gold);color:var(--ink);border:none;
  padding:13px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:0.2em;
  cursor:pointer;border-radius:4px;transition:all 0.12s;-webkit-appearance:none;}
.btn:active{transform:scale(0.98);}
.btn:hover{background:#d4b55e;}
.btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);}
.btn.ghost:hover{background:var(--gold-pale);}
.btn.big{font-size:1.3rem;padding:18px;letter-spacing:0.25em;}
.btn.dim{background:rgba(200,169,81,0.3);cursor:not-allowed;}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
/* NAV TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;}
.nav-tab{flex:1;padding:10px;font-family:'DM Mono',monospace;font-size:0.7rem;
  letter-spacing:0.12em;color:rgba(245,237,220,0.35);text-align:center;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;
  border-left:none;border-right:none;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
/* HUD */
.hud{padding:10px 14px 8px;border-bottom:1px solid var(--border);}
.hud-players{display:flex;gap:6px;margin-bottom:0;}
.hud-p{flex:1;border:1px solid var(--border);border-radius:5px;padding:8px 8px 6px;
  text-align:center;transition:all 0.2s;background:rgba(200,169,81,0.02);}
.hud-p.active{border-color:var(--gold);background:var(--gold-pale);}
.hud-p.done{opacity:0.35;}
.hud-pname{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.08em;
  color:rgba(245,237,220,0.4);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hud-pscore{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:0.08em;color:var(--parchment);}
.hud-pscore.pos{color:#4caf7d;}
.hud-pscore.neg{color:var(--ember);}
.hud-ptime{font-family:'DM Mono',monospace;font-size:0.82rem;color:rgba(200,169,81,0.55);
  margin-top:2px;letter-spacing:0.04em;}
.hud-ptime.urgent{color:#e07060;animation:pulse 0.8s ease-in-out infinite;}
.hud-ptime.done-t{color:rgba(245,237,220,0.2);}
.timer-bar-wrap{height:5px;background:rgba(200,169,81,0.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.timer-bar{height:100%;background:var(--gold);border-radius:2px;transition:width 1s linear;}
.timer-bar.urgent{background:var(--ember);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* PASS SCREEN */
.pass-wrap{text-align:center;padding:24px 0;}
.pass-eyebrow{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.2em;
  color:rgba(200,169,81,0.4);margin-bottom:8px;}
.pass-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,10vw,3rem);
  color:var(--gold);letter-spacing:0.25em;margin-bottom:6px;
  text-shadow:0 0 30px rgba(200,169,81,0.2);}
.pass-time{font-family:'DM Mono',monospace;font-size:1rem;
  color:rgba(200,169,81,0.5);letter-spacing:0.12em;margin-bottom:28px;}
/* CARD */
.card{background:linear-gradient(155deg,rgba(20,15,6,0.96),rgba(8,6,2,0.98));
  border:1px solid var(--border);border-radius:7px;padding:16px 15px;
  margin:10px 0 0;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,169,81,0.3),transparent);}
.card-label{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.18em;
  color:rgba(200,169,81,0.4);margin-bottom:7px;display:block;}
.ent-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;
  padding-bottom:10px;border-bottom:1px solid rgba(200,169,81,0.1);}
.ent-icon{font-size:1.8rem;flex-shrink:0;}
.ent-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);line-height:1.2;}
.ent-flavor{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:0.95rem;color:rgba(245,237,220,0.38);line-height:1.4;}
.situation{font-family:'Cormorant Garamond',serif;font-size:1.15rem;
  line-height:1.65;color:rgba(245,237,220,0.88);}
.options{display:flex;flex-direction:column;gap:7px;margin-top:2px;}
.opt{background:rgba(200,169,81,0.03);border:1px solid var(--border);
  border-radius:5px;padding:12px 14px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;font-size:1.08rem;
  color:rgba(245,237,220,0.8);line-height:1.5;
  transition:all 0.13s;text-align:left;width:100%;-webkit-appearance:none;}
.opt:hover{border-color:rgba(200,169,81,0.4);background:rgba(200,169,81,0.06);}
.opt:active{transform:scale(0.99);}
/* SCORE POP */
.score-pop{text-align:center;padding:12px;border-radius:5px;margin:10px 0;
  animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.82)}to{opacity:1;transform:scale(1)}}
.score-pop.pos{background:rgba(76,175,125,0.07);border:1px solid rgba(76,175,125,0.22);}
.score-pop.neg{background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.22);}
.score-pop.neu{background:var(--gold-pale);border:1px solid var(--gold-dim);}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:0.1em;display:block;}
.score-pop.pos .score-big{color:#4caf7d;}
.score-pop.neg .score-big{color:var(--ember);}
.score-pop.neu .score-big{color:var(--gold);}
.score-sub{font-family:'DM Mono',monospace;font-size:0.74rem;
  color:rgba(245,237,220,0.32);letter-spacing:0.08em;margin-top:3px;}
/* TIME UP */
.timeup-banner{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.28);
  border-radius:5px;padding:14px;text-align:center;margin:10px 0;}
.timeup-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--ember);
  letter-spacing:0.2em;display:block;}
.timeup-sub{font-family:'DM Mono',monospace;font-size:0.8rem;
  color:rgba(245,237,220,0.35);letter-spacing:0.08em;margin-top:4px;}
/* WIN / RESULTS */
.win-wrap{text-align:center;padding:6px 0;}
.win-eyebrow{font-family:'DM Mono',monospace;font-size:0.76rem;letter-spacing:0.18em;
  color:rgba(200,169,81,0.38);margin-bottom:5px;}
.win-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,9vw,3rem);
  color:var(--gold);letter-spacing:0.22em;text-shadow:0 0 35px rgba(200,169,81,0.22);margin-bottom:2px;}
.win-sub{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.05rem;color:rgba(245,237,220,0.35);margin-bottom:14px;}
.podium{display:flex;flex-direction:column;gap:8px;margin:14px 0;}
.pod{display:flex;align-items:center;gap:12px;border:1px solid var(--border);
  border-radius:6px;padding:12px 14px;background:rgba(200,169,81,0.02);}
.pod.first{border-color:var(--gold);background:var(--gold-pale);}
.pod-rank{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:rgba(245,237,220,0.2);
  letter-spacing:0.1em;width:28px;flex-shrink:0;}
.pod.first .pod-rank{color:var(--gold);}
.pod-info{flex:1;text-align:left;}
.pod-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--parchment);}
.pod-rating{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:rgba(245,237,220,0.38);}
.pod-right{text-align:right;}
.pod-score{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.1em;color:var(--parchment);}
.pod.first .pod-score{color:var(--gold);}
.pod-pct{font-family:'DM Mono',monospace;font-size:0.7rem;color:rgba(245,237,220,0.35);}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:12px 0;}
.hist-title{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;
  color:rgba(200,169,81,0.32);margin:12px 0 7px;text-align:left;}
.hist-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid rgba(200,169,81,0.05);
  font-family:'DM Mono',monospace;font-size:0.72rem;}
.hist-row:last-child{border:none;}
/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(200,169,81,0.07);font-family:'DM Mono',monospace;font-size:0.72rem;}
.lb-row:last-child{border:none;}
.lb-rank{color:rgba(200,169,81,0.4);width:22px;flex-shrink:0;text-align:right;}
.lb-name{flex:1;color:var(--parchment);font-family:'Cormorant Garamond',serif;font-size:1rem;}
.lb-pct{color:var(--gold);font-weight:500;min-width:42px;text-align:right;}
.lb-rating{color:rgba(245,237,220,0.3);font-size:0.62rem;min-width:80px;text-align:right;}
.lb-loading{text-align:center;font-family:'DM Mono',monospace;font-size:0.72rem;
  color:rgba(200,169,81,0.4);padding:20px;letter-spacing:0.1em;
  animation:pulse2 1.4s ease-in-out infinite;}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.2}}
.submit-status{font-family:'DM Mono',monospace;font-size:0.68rem;
  text-align:center;padding:8px;border-radius:4px;margin-top:8px;letter-spacing:0.08em;}
.submit-status.ok{background:rgba(76,175,125,0.08);color:#4caf7d;border:1px solid rgba(76,175,125,0.2);}
.submit-status.err{background:rgba(192,57,43,0.08);color:#e07060;border:1px solid rgba(192,57,43,0.2);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">ETHOS</div>
    <div class="byline">Good intentions meet real decisions</div>
  </div>

  <!-- ══ SETUP ══ -->
  <div class="screen active" id="s-setup">
    <p class="setup-title">Set up your game</p>
    <p class="setup-sub">STRATEGIST LEVEL · AGES 14+</p>
    <label class="lbl">NUMBER OF PLAYERS</label>
    <div class="pick-row" id="player-count-row">
      <div class="popt" data-v="1" onclick="pickPlayers(this)">
        <span class="popt-val">1</span><span class="popt-lbl">Solo</span>
      </div>
      <div class="popt" data-v="2" onclick="pickPlayers(this)">
        <span class="popt-val">2</span><span class="popt-lbl">Two</span>
      </div>
      <div class="popt" data-v="3" onclick="pickPlayers(this)">
        <span class="popt-val">3</span><span class="popt-lbl">Three</span>
      </div>
    </div>
    <div class="name-fields" id="name-fields">
      <label class="lbl">PLAYER NAMES</label>
      <input class="finput" id="n1" type="text" placeholder="Enter your name — required">
      <input class="finput" id="n2" type="text" placeholder="Player 2 name — required" style="display:none">
      <input class="finput" id="n3" type="text" placeholder="Player 3 name — required" style="display:none">
    </div>
    <label class="lbl">TIME PER PLAYER</label>
    <div class="pick-row" id="time-row">
      <div class="popt" data-v="2" onclick="pickTime(this)">
        <span class="popt-val">2</span><span class="popt-lbl">min</span>
      </div>
      <div class="popt" data-v="5" onclick="pickTime(this)">
        <span class="popt-val">5</span><span class="popt-lbl">min</span>
      </div>
      <div class="popt" data-v="10" onclick="pickTime(this)">
        <span class="popt-val">10</span><span class="popt-lbl">min</span>
      </div>
      <div class="popt" data-v="15" onclick="pickTime(this)">
        <span class="popt-val">15</span><span class="popt-lbl">min</span>
      </div>
    </div>
    <button class="btn" onclick="startGame()">BEGIN →</button>
    <div style="margin-top:10px;">
      <button class="btn ghost" onclick="showLeaderboard()">🏆 LEADERBOARD</button>
    </div>
  </div>

  <!-- ══ LEADERBOARD ══ -->
  <div class="screen" id="s-leaderboard">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn ghost" style="width:auto;padding:8px 14px;font-size:0.8rem;" onclick="showScreen('s-setup')">← BACK</button>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);letter-spacing:0.2em;">ALL-TIME LEADERBOARD</span>
    </div>
    <div id="lb-content"><div class="lb-loading">LOADING SCORES...</div></div>
  </div>

  <!-- ══ PASS SCREEN ══ -->
  <div class="screen" id="s-pass">
    <div class="pass-wrap">
      <div class="pass-eyebrow">HAND THE PHONE TO</div>
      <div class="pass-name" id="pass-name">—</div>
      <div class="pass-time" id="pass-time">5:00 remaining</div>
      <button class="btn big" onclick="startMyTurn()">START MY TURN →</button>
    </div>
  </div>

  <!-- ══ GAME ══ -->
  <div class="screen" id="s-game">
    <div class="hud">
      <div class="hud-players" id="hud-players"></div>
    </div>
    <div id="panels"></div>
  </div>

  <!-- ══ RESULTS ══ -->
  <div class="screen" id="s-win">
    <div class="win-wrap">
      <div class="win-eyebrow">GAME OVER</div>
      <div class="win-title" id="win-title">—</div>
      <div class="win-sub" id="win-sub"></div>
      <div class="podium" id="podium"></div>
      <div id="submit-area"></div>
      <div class="divider"></div>
      <div class="hist-title">▸ ROUND HISTORY</div>
      <div id="hist-log"></div>
      <div style="margin-top:16px;">
        <button class="btn" onclick="showLeaderboard()">🏆 SEE LEADERBOARD</button>
      </div>
      <div style="margin-top:8px;">
        <button class="btn ghost" onclick="resetGame()">PLAY AGAIN</button>
      </div>
    </div>
  </div>

</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzdQQHefalv8xUnk0wWBO1jFSTGVlCn-pZuO2AFiJgntP8TaNj_Nd_BBV1Ow2MRj9yU/exec';

// ══ GAME STATE ══
let g={};
let selectedPlayers=0;
let selectedTime=0;
let timerInterval=null;
let pool=[];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ══ SETUP ══
function pickPlayers(el){
  document.querySelectorAll('#player-count-row .popt').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  selectedPlayers=parseInt(el.dataset.v);
  document.getElementById('n2').style.display=selectedPlayers>=2?'block':'none';
  document.getElementById('n3').style.display=selectedPlayers>=3?'block':'none';
}
function pickTime(el){
  document.querySelectorAll('#time-row .popt').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  selectedTime=parseInt(el.dataset.v);
}

function startGame(){
  if(!selectedPlayers){alert('Please select number of players.');return;}
  if(!selectedTime){alert('Please select a time limit.');return;}
  const inputs=[document.getElementById('n1'),document.getElementById('n2'),document.getElementById('n3')];
  const names=[];
  let valid=true;
  for(let i=0;i<selectedPlayers;i++){
    const v=inputs[i].value.trim();
    inputs[i].classList.remove('error');
    if(!v){inputs[i].classList.add('error');valid=false;}
    else names.push(v);
  }
  if(!valid){alert('Please enter a name for every player.');return;}

  const timeEach=selectedTime*60;
  g={
    players:names.map(n=>({name:n,score:0,timeLeft:timeEach,timeTotal:timeEach,done:false,scenariosAnswered:0,history:[]})),
    current:0,
    history:[],
    pool:shuffle([...SCENARIOS])
  };
  pool=shuffle([...SCENARIOS]);
  buildHUD();
  showScreen('s-game');
  showPassScreen();
}

// ══ HUD ══
function buildHUD(){
  const wrap=document.getElementById('hud-players');
  wrap.innerHTML=g.players.map((p,i)=>`
    <div class="hud-p" id="hudp${i}">
      <div class="hud-pname">${p.name.toUpperCase().slice(0,9)}</div>
      <div class="hud-pscore" id="huds${i}">0</div>
      <div class="hud-ptime" id="hudt${i}">${fmtTime(p.timeLeft)}</div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="hudbar${i}" style="width:100%"></div></div>
    </div>`).join('');
}

function updateHUD(){
  g.players.forEach((p,i)=>{
    const sc=document.getElementById(`huds${i}`);
    sc.textContent=(p.score>0?'+':'')+p.score;
    sc.className='hud-pscore'+(p.score>0?' pos':p.score<0?' neg':'');
    const tc=document.getElementById(`hudt${i}`);
    tc.textContent=p.done?'DONE':fmtTime(p.timeLeft);
    tc.className='hud-ptime'+(p.done?' done-t':p.timeLeft<=30?' urgent':'');
    const bar=document.getElementById(`hudbar${i}`);
    bar.style.width=Math.max(0,p.timeLeft/p.timeTotal*100)+'%';
    bar.className='timer-bar'+(p.timeLeft<=30?' urgent':'');
    document.getElementById(`hudp${i}`).className='hud-p'+(i===g.current&&!p.done?' active':p.done?' done':'');
  });
}

function fmtTime(s){
  const m=Math.floor(s/60),sec=s%60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ══ PASS SCREEN ══
function showPassScreen(){
  stopTimer();
  // Find next non-done player in round-robin
  const allDone=g.players.every(p=>p.done);
  if(allDone){endGame();return;}
  // Advance to next non-done player
  if(g.players[g.current].done){
    advancePlayer();
  }
  const p=g.players[g.current];
  document.getElementById('pass-name').textContent=p.name.toUpperCase();
  document.getElementById('pass-time').textContent=fmtTime(p.timeLeft)+' remaining';
  showScreen('s-pass');
}

function startMyTurn(){
  showScreen('s-game');
  updateHUD();
  showScenario();
  startTimer();
}

// ══ TIMER — only ticks during active turn ══
function startTimer(){
  stopTimer();
  timerInterval=setInterval(()=>{
    const p=g.players[g.current];
    if(p.timeLeft<=1){
      p.timeLeft=0;
      p.done=true;
      updateHUD();
      stopTimer();
      // Disable any remaining option buttons
      document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
      showTimeUpThenPass();
      return;
    }
    p.timeLeft--;
    updateHUD();
  },1000);
}

function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
}

// ══ SCENARIO ══
function panels(){return document.getElementById('panels');}
function clearPanels(){panels().innerHTML='';}
function addCard(html){
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=html;
  panels().appendChild(d);
  setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),40);
}

function showScenario(){
  clearPanels();
  if(g.pool.length===0) g.pool=shuffle([...SCENARIOS]);
  const sc=g.pool.pop();
  g.currentScenario=sc;
  const opts=shuffle([...sc.options]);
  g.currentOpts=opts;

  addCard(`
    <div class="ent-row">
      <span class="ent-icon">${sc.icon}</span>
      <div><div class="ent-name">${sc.entity}</div>
      <div class="ent-flavor">${sc.flavor}</div></div>
    </div>
    <span class="card-label">▸ THE SITUATION</span>
    <p class="situation">${sc.situation}</p>
  `);

  addCard(`
    <span class="card-label">▸ WHAT DO YOU DO?</span>
    <div class="options">
      ${opts.map((o,i)=>`
        <button class="opt" id="opt${i}" onclick="pickOption(${i})">${o.text}</button>
      `).join('')}
    </div>
  `);
}

function pickOption(idx){
  stopTimer();
  document.querySelectorAll('.opt').forEach(o=>{o.disabled=true;o.style.display='none';});
  const chosen=g.currentOpts[idx];
  const p=g.players[g.current];
  p.score+=chosen.score;
  p.scenariosAnswered++;
  p.history.push({entity:g.currentScenario.entity,score:chosen.score,label:chosen.label});
  g.history.push({who:p.name,entity:g.currentScenario.entity,score:chosen.score,label:chosen.label});
  updateHUD();

  const cls=chosen.score>0?'pos':chosen.score<0?'neg':'neu';
  addCard(`
    <div style="border-left:3px solid var(--gold);padding:10px 14px;
      background:var(--gold-pale);border-radius:0 5px 5px 0;margin-bottom:10px;">
      <span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:rgba(200,169,81,0.5);
        letter-spacing:0.12em;display:block;margin-bottom:5px;">▸ YOUR CHOICE</span>
      <p style="font-family:'Cormorant Garamond',serif;font-size:1rem;
        color:rgba(245,237,220,0.85);line-height:1.55;">${chosen.text}</p>
    </div>
    <div class="score-pop ${cls}">
      <span class="score-big">${chosen.score>0?'+':''}${chosen.score}</span>
      <span class="score-sub">${chosen.label.toUpperCase()} — ${chosen.why}</span>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="afterAnswer()">NEXT →</button>
    </div>
  `);
}

function afterAnswer(){
  const p=g.players[g.current];
  if(p.timeLeft<=0||p.done){
    p.done=true;
    showTimeUpThenPass();
  } else {
    // Round-robin: pass to next player after each answer
    advancePlayer();
    showPassScreen();
  }
}

function showTimeUpThenPass(){
  stopTimer();
  const p=g.players[g.current];
  clearPanels();
  addCard(`
    <div class="timeup-banner">
      <span class="timeup-title">⏱ TIME UP</span>
      <div class="timeup-sub">${p.name.toUpperCase()} · FINAL: ${p.score>0?'+':''}${p.score} · ${p.scenariosAnswered} SCENARIOS</div>
    </div>
  `);
  const allDone=g.players.every(p=>p.done);
  if(allDone){
    addCard(`<div class="btn-row"><button class="btn" onclick="endGame()">SEE RESULTS →</button></div>`);
  } else {
    advancePlayer();
    addCard(`<div class="btn-row"><button class="btn" onclick="showPassScreen()">PASS TO NEXT PLAYER →</button></div>`);
  }
}

function advancePlayer(){
  const total=g.players.length;
  let next=(g.current+1)%total;
  let tries=0;
  while(g.players[next].done&&tries<total){next=(next+1)%total;tries++;}
  g.current=next;
}

// ══ RATINGS ══
function getRating(pct){
  if(pct>=90)return['🏆','Moral Exemplar'];
  if(pct>=75)return['⭐','Ethically Strong'];
  if(pct>=55)return['✅','Sound Character'];
  if(pct>=35)return['🤔','Adequate'];
  if(pct>=15)return['⚠️','Questionable'];
  return['❌','Moral Failure'];
}

// ══ END GAME ══
function endGame(){
  stopTimer();
  // Calculate max possible: each scenario answered = +10 max
  g.players.forEach(p=>{
    p.maxPossible=p.scenariosAnswered*10;
    // Clamp to avoid div/0
    p.pct=p.maxPossible>0?Math.round(((p.score/p.maxPossible)*100)):0;
    // pct can go negative if all wrong — floor at 0 for display
    p.pctDisplay=Math.max(0,p.pct);
  });

  const sorted=[...g.players].sort((a,b)=>b.pctDisplay-a.pctDisplay);
  const winner=sorted[0];
  const tie=sorted.length>1&&sorted[0].pctDisplay===sorted[1].pctDisplay;

  document.getElementById('win-title').textContent=tie?'A TIE':winner.name.toUpperCase()+' WINS';
  document.getElementById('win-sub').textContent=tie?'Equally matched in moral judgement':'The moral high ground belongs to one';

  const rankCls=['first','second','third'];
  document.getElementById('podium').innerHTML=sorted.map((p,i)=>{
    const r=getRating(p.pctDisplay);
    return `<div class="pod ${rankCls[i]||''}">
      <div class="pod-rank">${i+1}</div>
      <div class="pod-info">
        <div class="pod-name">${p.name}</div>
        <div class="pod-rating">${r[0]} ${r[1]}</div>
      </div>
      <div class="pod-right">
        <div class="pod-score">${p.score>0?'+':''}${p.score}</div>
        <div class="pod-pct">${p.pctDisplay}% of perfect</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('hist-log').innerHTML=g.history.map(h=>{
    const pi=g.players.findIndex(p=>p.name===h.who);
    const colours=['#5dade2','#e07060','#7dbb8a'];
    return `<div class="hist-row">
      <span style="color:${colours[pi]||'#aaa'};min-width:70px;">${h.who.slice(0,9)}</span>
      <span style="color:rgba(245,237,220,0.35);flex:1;padding:0 6px;overflow:hidden;
        text-overflow:ellipsis;white-space:nowrap;">${h.entity}</span>
      <span style="color:rgba(245,237,220,0.28);margin-right:6px;font-size:0.62rem;">${h.label}</span>
      <span style="color:${h.score>=0?'#4caf7d':'var(--ember)'}">${h.score>0?'+':''}${h.score}</span>
    </div>`;
  }).join('');

  showScreen('s-win');
  submitScores(g.players);
}

// ══ GOOGLE SHEETS ══
function submitScores(players){
  const area=document.getElementById('submit-area');
  area.innerHTML='<div class="submit-status" style="color:rgba(200,169,81,0.4);border:none;">Saving scores...</div>';
  let completed=0;
  let anyError=false;
  players.forEach(p=>{
    const payload={name:p.name,score:p.score,max:p.maxPossible,percentage:p.pctDisplay};
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)})
      .then(r=>r.json())
      .then(()=>{
        completed++;
        if(completed===players.length){
          area.innerHTML=anyError
            ?'<div class="submit-status err">Some scores could not be saved.</div>'
            :'<div class="submit-status ok">✓ Scores saved to leaderboard</div>';
        }
      })
      .catch(()=>{
        anyError=true;completed++;
        if(completed===players.length){
          area.innerHTML='<div class="submit-status err">Could not reach leaderboard — scores not saved.</div>';
        }
      });
  });
}

// ══ LEADERBOARD ══
function showLeaderboard(){
  showScreen('s-leaderboard');
  document.getElementById('lb-content').innerHTML='<div class="lb-loading">LOADING SCORES...</div>';
  fetch(SCRIPT_URL)
    .then(r=>r.json())
    .then(rows=>{
      if(!rows||!rows.length){
        document.getElementById('lb-content').innerHTML=
          '<div style="font-family:DM Mono,monospace;font-size:0.72rem;color:rgba(245,237,220,0.3);text-align:center;padding:24px;">No scores yet — be the first!</div>';
        return;
      }
      const html=rows.map((r,i)=>{
        const rating=getRating(parseFloat(r[3])||0);
        return `<div class="lb-row">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-name">${r[0]||'—'}</div>
          <div class="lb-pct">${r[3]||0}%</div>
          <div class="lb-rating">${rating[0]} ${rating[1]}</div>
        </div>`;
      }).join('');
      document.getElementById('lb-content').innerHTML=
        `<div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:rgba(200,169,81,0.3);
          letter-spacing:0.15em;margin-bottom:10px;">▸ TOP 15 · ALL TIME</div>${html}`;
    })
    .catch(()=>{
      document.getElementById('lb-content').innerHTML=
        '<div style="font-family:DM Mono,monospace;font-size:0.72rem;color:#e07060;text-align:center;padding:24px;">Could not load leaderboard.</div>';
    });
}

  window.scrollTo({top:0,behavior:'smooth'});
}

  {entity:"Neighbourhood Watch",icon:"👀",flavor:"means well, keeps detailed notes on everyone",situation:"The captain asks you to monitor a family of a different ethnicity — clearly without cause.",options:[{text:"Refuse and name directly that his suspicion seems based on bias.",score:10,cls:"best",label:"Principled",why:"Naming bias clearly is uncomfortable but necessary."},{text:"Refuse without explaining why.",score:5,cls:"good",label:"Reasonable",why:"Protects the family but misses a chance to challenge the bias."},{text:"Watch but only report genuinely suspicious behaviour.",score:-3,cls:"poor",label:"Questionable",why:"Participating in a biased request even partially legitimises it."},{text:"Agree and report nothing — play along to keep peace.",score:-7,cls:"worst",label:"Harmful",why:"Pretending to comply with a biased request makes you complicit."}]},
  {entity:"Restaurant Diaz",icon:"🍽️",flavor:"built from nothing, now under pressure",situation:"You discover your family restaurant is not paying workers the legal minimum wage. Your parents say it is the only way to survive.",options:[{text:"Tell your parents it is illegal and wrong — push for change.",score:10,cls:"best",label:"Principled",why:"Workers' rights are not negotiable regardless of business pressure."},{text:"Research legal options for small businesses and present them.",score:5,cls:"good",label:"Reasonable",why:"Constructive — helps fix the problem rather than just naming it."},{text:"Stay out of it — their business, their decision.",score:-3,cls:"poor",label:"Questionable",why:"Knowing about wage theft and doing nothing is complicity."},{text:"Report them to labour authorities anonymously.",score:-7,cls:"worst",label:"Harmful",why:"Reporting family without any conversation first is a last resort, not a first step."}]},
  {entity:"Honor Code Officer",icon:"⚖️",flavor:"a peer-elected role nobody wanted until it had consequences",situation:"You catch a student cheating who is dealing with a serious family crisis. Rules require a failing grade.",options:[{text:"Follow the rules but advocate strongly for leniency.",score:10,cls:"best",label:"Principled",why:"Uphold the system while using your voice to humanise it."},{text:"Apply the rule exactly as written.",score:5,cls:"good",label:"Reasonable",why:"Consistent enforcement matters but ignores the human context."},{text:"Let it go given what they are going through.",score:-3,cls:"poor",label:"Questionable",why:"Well-intentioned, but inconsistent enforcement undermines the whole system."},{text:"Cover it up entirely — rules should have exceptions.",score:-7,cls:"worst",label:"Harmful",why:"Secret exceptions corrupt the integrity of the code you were chosen to uphold."}]},
  {entity:"The Hustle Podcast",icon:"🎙️",flavor:"two dropouts who turned hustle culture into a media empire",situation:"A popular podcast will feature you — if you endorse a product you have not tried and do not believe in.",options:[{text:"Decline — your credibility is worth more than the exposure.",score:10,cls:"best",label:"Principled",why:"Endorsing things you do not believe in is the start of losing yourself."},{text:"Ask to try it first and only endorse if you genuinely like it.",score:5,cls:"good",label:"Reasonable",why:"Honest compromise that keeps your integrity intact."},{text:"Accept but add a small disclaimer nobody will read.",score:-3,cls:"poor",label:"Questionable",why:"Technically transparent but practically still deceptive."},{text:"Accept — it is just marketing, everyone does it.",score:-7,cls:"worst",label:"Harmful",why:"Misleading your audience for personal gain betrays their trust."}]},
  {entity:"Ranked Grind",icon:"🕹️",flavor:"worships improvement and despises shortcuts",situation:"A junior player asks for coaching. Helping them will likely create competition that costs you your top rank.",options:[{text:"Help them fully — a rising tide lifts all boats.",score:10,cls:"best",label:"Principled",why:"Generosity that costs you something is the real kind."},{text:"Decline politely — competition is competition.",score:5,cls:"good",label:"Reasonable",why:"Honest about your limits, even if not the most generous choice."},{text:"Help with basics but hold back your advanced strategies.",score:-3,cls:"poor",label:"Questionable",why:"Partial help driven by self-protection is not genuine mentorship."},{text:"Give them deliberately wrong advice.",score:-7,cls:"worst",label:"Harmful",why:"Sabotaging someone who trusts you is a serious ethical violation."}]},
  {entity:"Ivy League Forum",icon:"🏫",flavor:"anonymous students competing for prestige at any cost",situation:"You have access to another student's application essay that is far better than yours. You could adapt key ideas.",options:[{text:"Write your own essay — your authentic voice is what matters.",score:10,cls:"best",label:"Principled",why:"Authenticity is both ethical and strategically smarter."},{text:"Ask the student openly if you can discuss their approach.",score:5,cls:"good",label:"Reasonable",why:"Turns a potential breach into honest collaboration."},{text:"Use it as loose inspiration while keeping your own voice.",score:-3,cls:"poor",label:"Questionable",why:"The line between inspiration and theft is blurrier than it feels."},{text:"Copy it closely and change the wording.",score:-7,cls:"worst",label:"Harmful",why:"Plagiarism regardless of how many words you change."}]},
  {entity:"School Newspaper",icon:"📰",flavor:"small paper, real editorial power",situation:"Your editor kills a story about racism in the sports programme because the coach advertises in the paper.",options:[{text:"Publish it on your own platform and explain why it was killed.",score:10,cls:"best",label:"Principled",why:"Journalism suppressed by advertiser pressure deserves daylight."},{text:"Escalate to the faculty advisor over the editor's head.",score:5,cls:"good",label:"Reasonable",why:"Works within the system before going outside it."},{text:"Rewrite it to be less critical so it gets through.",score:-3,cls:"poor",label:"Questionable",why:"Softening a true story to appease pressure is self-censorship."},{text:"Drop it — you do not want the conflict.",score:-7,cls:"worst",label:"Harmful",why:"Letting commercial interests silence important stories is a press failure."}]},
  {entity:"Debate Team",icon:"🎓",flavor:"teaches you to argue any side — dangerous skill",situation:"You overhear a rival team's full strategy through a thin wall before the competition.",options:[{text:"Tell your coach and ask to move to a different room.",score:10,cls:"best",label:"Principled",why:"Removes the unfair advantage before it can corrupt the result."},{text:"Pretend you heard nothing and compete normally.",score:5,cls:"good",label:"Reasonable",why:"Tries to restore fairness but does not address the advantage."},{text:"Tell your teammates but tell them not to use it.",score:-3,cls:"poor",label:"Questionable",why:"Sharing information you should not have spread the problem."},{text:"Use what you heard — it was their fault for being overheard.",score:-7,cls:"worst",label:"Harmful",why:"Accidental advantage becomes deliberate unfairness the moment you use it."}]},
  {entity:"Café Lumière",icon:"☕",flavor:"your first real job, complicated politics",situation:"A customer leaves a wallet with significant cash. Your coworker says split it — they are long gone.",options:[{text:"Hand it in and request it be held for the customer.",score:10,cls:"best",label:"Principled",why:"The money is not yours — absence does not change that."},{text:"Try to find the customer using ID in the wallet.",score:5,cls:"good",label:"Reasonable",why:"Proactive honesty, though going through someone's wallet has privacy issues."},{text:"Leave it on the counter and let someone else deal with it.",score:-3,cls:"poor",label:"Questionable",why:"Avoids wrongdoing but abandons the responsibility to help."},{text:"Split it — they should not have left it.",score:-7,cls:"worst",label:"Harmful",why:"Victim-blaming does not change the fact that taking it is theft."}]},
  {entity:"Team Vortex",icon:"🎮",flavor:"sponsorships, contracts, and a conduct policy",situation:"Your team captain wants to publicly blame a loss on one player who made key errors, to protect team morale.",options:[{text:"Refuse — scapegoating damages trust far more than any loss.",score:10,cls:"best",label:"Principled",why:"Blame cultures destroy teams. Honest cultures build them."},{text:"Suggest a team debrief that addresses errors without singling anyone out.",score:5,cls:"good",label:"Reasonable",why:"Constructive approach that protects the individual."},{text:"Go along with it — it is the captain's call.",score:-3,cls:"poor",label:"Questionable",why:"Following orders does not remove your responsibility for unfairness."},{text:"Publicly defend the player, directly contradicting the captain.",score:-7,cls:"worst",label:"Harmful",why:"Public contradiction creates new conflict rather than resolving it."}]},
  {entity:"City Youth Council",icon:"🏛️",flavor:"real power, real politics, real disappointments",situation:"A council member offers to back your proposal — if you support theirs, which you think is genuinely harmful.",options:[{text:"Decline and let your proposal stand on its own merits.",score:10,cls:"best",label:"Principled",why:"Trades that require endorsing harm compromise your integrity."},{text:"Negotiate — support a modified version that removes the harm.",score:5,cls:"good",label:"Reasonable",why:"Pragmatic politics that tries to improve the bad proposal."},{text:"Accept but vote against their proposal at the last moment.",score:-3,cls:"poor",label:"Questionable",why:"Deception in a negotiation is dishonest even if the outcome is better."},{text:"Accept the deal — politics requires compromise.",score:-7,cls:"worst",label:"Harmful",why:"Compromise is not the same as trading your vote on something harmful."}]},
  {entity:"@truthbomb.tae",icon:"📱",flavor:"calls out injustice online — sometimes accurately",situation:"Your post calling out a classmate for racism goes viral. They now receive serious threats from strangers.",options:[{text:"Post asking followers to stop the threats while keeping the criticism up.",score:10,cls:"best",label:"Principled",why:"Accountability and safety are not mutually exclusive."},{text:"Publicly apologise for the post entirely.",score:5,cls:"good",label:"Reasonable",why:"Reduces harm but may be overcorrection if the criticism was fair."},{text:"Delete everything to stop the harassment.",score:-3,cls:"poor",label:"Questionable",why:"Erasing accountability to stop harassment you did not cause is not the answer."},{text:"Say nothing — you did not send the threats.",score:-7,cls:"worst",label:"Harmful",why:"When your words mobilise a crowd, you carry responsibility for what follows."}]},
  {entity:"Burger Barn",icon:"🍔",flavor:"rules, favourites, and the schedule held over you",situation:"Your manager gives better shifts to employees who laugh at his inappropriate jokes. You are losing income.",options:[{text:"Report it to HR as a hostile work environment.",score:10,cls:"best",label:"Principled",why:"This is workplace misconduct. Formal channels exist for it."},{text:"Tell the manager directly his behaviour is inappropriate.",score:5,cls:"good",label:"Reasonable",why:"Direct conversation first is fair before escalating."},{text:"Start looking for a new job and say nothing.",score:-3,cls:"poor",label:"Questionable",why:"Protects yourself but leaves the problem in place for your coworkers."},{text:"Play along to get the better shifts.",score:-7,cls:"worst",label:"Harmful",why:"Participating in inappropriate behaviour to gain rewards is complicity."}]},
  {entity:"Equity Alliance",icon:"✊",flavor:"fights for fairness and occasionally among themselves",situation:"Your group wants to ban a student for views they hold privately but have never expressed at meetings.",options:[{text:"Oppose the ban — punishing private beliefs rather than actions is wrong.",score:10,cls:"best",label:"Principled",why:"Thought policing undermines the open society equity groups claim to build."},{text:"Propose a warning system — ban only if they act on those views.",score:5,cls:"good",label:"Reasonable",why:"Balances community safety with proportionate response."},{text:"Support the ban — the group has to feel safe.",score:-3,cls:"poor",label:"Questionable",why:"Safety matters but this standard could be used to exclude anyone."},{text:"Support and actively help enforce the ban.",score:-7,cls:"worst",label:"Harmful",why:"Enforcing punishment for private beliefs is an authoritarian act."}]},
  {entity:"Tutoring Agency",icon:"📚",flavor:"matches desperate students with tutors who know the tests too well",situation:"Another tutor gives students direct answers. They earn more than you as a result.",options:[{text:"Report it — it harms students and is unfair to honest tutors.",score:10,cls:"best",label:"Principled",why:"Dishonest competition that harms students cannot be ignored."},{text:"Talk to the other tutor first and ask them to stop.",score:5,cls:"good",label:"Reasonable",why:"Peer conversation before escalation is fair."},{text:"Do nothing — it is their choice how they tutor.",score:-3,cls:"poor",label:"Questionable",why:"When bad practice harms students, silence is not neutral."},{text:"Start doing the same to stay competitive.",score:-7,cls:"worst",label:"Harmful",why:"Matching unethical behaviour to compete is a race to the bottom."}]},
  {entity:"School Climate Group",icon:"🌱",flavor:"passionate, organised, starting to scare the administration",situation:"A donor offers major funding but they run a fast fashion company with a poor environmental record.",options:[{text:"Decline — taking money from the problem undermines your credibility.",score:10,cls:"best",label:"Principled",why:"Your message is your most valuable asset."},{text:"Accept but require a public commitment to improvement.",score:5,cls:"good",label:"Reasonable",why:"Turns the relationship into leverage for real change."},{text:"Accept quietly and use the money for good.",score:-3,cls:"poor",label:"Questionable",why:"Greenwashing a polluter, even unintentionally, is still greenwashing."},{text:"Accept and publicly thank them as a partner.",score:-7,cls:"worst",label:"Harmful",why:"Legitimising a bad actor in exchange for money betrays your cause."}]},

  {entity:"The Viral App",icon:"💻",flavor:"built in a bedroom, now it is everywhere",situation:"Your app has a bug that only affects users in low-income areas. Fixing it delays a profitable feature launch.",options:[{text:"Fix the bug first — all users deserve equal service.",score:10,cls:"best",label:"Principled",why:"A bug that only affects poorer users is a bias problem too."},{text:"Fix both simultaneously even if it takes longer.",score:5,cls:"good",label:"Reasonable",why:"Balanced approach that treats both as priorities."},{text:"Launch the feature and patch the bug next update.",score:-3,cls:"poor",label:"Questionable",why:"Knowingly shipping something that disadvantages specific users is problematic."},{text:"Launch and quietly deprioritise the bug indefinitely.",score:-7,cls:"worst",label:"Harmful",why:"Ignoring a known inequity for profit is discriminatory."}]},
  {entity:"Debate Team",icon:"🎓",flavor:"teaches you to argue any side — dangerous skill",situation:"You could win the championship by exploiting a technical rule loophole. It is legal but against the spirit of fair debate.",options:[{text:"Compete on merit — a loophole victory is hollow.",score:10,cls:"best",label:"Principled",why:"What you win by gaming the rules you did not truly earn."},{text:"Use it but flag it to organisers after so they can close it.",score:5,cls:"good",label:"Reasonable",why:"Uses what is available while contributing to a fairer system."},{text:"Use it — if it is in the rules it is fair game.",score:-3,cls:"poor",label:"Questionable",why:"Legal and ethical are not the same thing."},{text:"Use it and celebrate how clever you were.",score:-7,cls:"worst",label:"Harmful",why:"Celebrating rule exploitation encourages a culture of gaming systems."}]},
  {entity:"Student Council",icon:"🏛️",flavor:"a little power that reveals a lot about character",situation:"You can secure funding by misrepresenting student needs in a grant application.",options:[{text:"Submit an honest application — the real needs are compelling enough.",score:10,cls:"best",label:"Principled",why:"Misrepresentation in grant applications is fraud, regardless of intent."},{text:"Find a creative but honest way to frame the needs more compellingly.",score:5,cls:"good",label:"Reasonable",why:"Good writing is not the same as lying."},{text:"Exaggerate slightly — everyone does on grant applications.",score:-3,cls:"poor",label:"Questionable",why:"Normalising small dishonesty still corrodes integrity."},{text:"Fabricate the data — the school really needs the money.",score:-7,cls:"worst",label:"Harmful",why:"This is fraud. Good intentions do not change that."}]},
  {entity:"Neighbourhood Watch",icon:"👀",flavor:"means well, keeps detailed notes on everyone",situation:"You witness a neighbour being verbally harassed by a group of teens. You are outnumbered.",options:[{text:"Call for help while staying visible so the neighbour is not alone.",score:10,cls:"best",label:"Principled",why:"Effective bystander action does not require heroism — just presence."},{text:"Intervene directly and verbally.",score:5,cls:"good",label:"Reasonable",why:"Brave — but assess the risk first, escalation is possible."},{text:"Walk away and call police once you are safe.",score:-3,cls:"poor",label:"Questionable",why:"Prioritises your safety over the person being harassed."},{text:"Keep walking and do nothing.",score:-7,cls:"worst",label:"Harmful",why:"Choosing not to act is still a choice."}]},
  {entity:"Ivy League Forum",icon:"🏫",flavor:"anonymous students competing for prestige at any cost",situation:"A wealthy student pays you to write their college application. The money would cover three months of family expenses.",options:[{text:"Decline — financial pressure does not justify helping someone cheat.",score:10,cls:"best",label:"Principled",why:"This harms the integrity of a system others play fairly."},{text:"Offer to coach them intensively instead — legitimately.",score:5,cls:"good",label:"Reasonable",why:"An honest way to earn money while still helping them."},{text:"Do it but feel guilty about it.",score:-3,cls:"poor",label:"Questionable",why:"Guilt without changed behaviour is just discomfort, not ethics."},{text:"Do it — rich students have every other advantage anyway.",score:-7,cls:"worst",label:"Harmful",why:"Injustice in the system does not make it right to profit from it."}]},
  {entity:"School Climate Group",icon:"🌱",flavor:"passionate, organised, starting to scare the administration",situation:"Your group's pollution data was collected incorrectly and significantly overstates the problem.",options:[{text:"Correct and republish the data even if it weakens your campaign.",score:10,cls:"best",label:"Principled",why:"A campaign built on bad data will collapse and damage your cause."},{text:"Disclose the error to your closest allies but not publicly.",score:5,cls:"good",label:"Reasonable",why:"More honest than nothing, but still not fully transparent."},{text:"Fix the methodology going forward without addressing past claims.",score:-3,cls:"poor",label:"Questionable",why:"Fixing the future while hiding the past is still dishonesty."},{text:"Keep using it — the underlying problem is real even if numbers are off.",score:-7,cls:"worst",label:"Harmful",why:"Knowingly using false data for a good cause destroys credibility when discovered."}]},
  {entity:"Team Vortex",icon:"🎮",flavor:"sponsorships, contracts, and a conduct policy",situation:"You are offered a spot on a better team mid-season. Leaving would effectively end your current team's run.",options:[{text:"Honour your commitment and finish the season first.",score:10,cls:"best",label:"Principled",why:"Commitments to teammates carry moral weight beyond any contract."},{text:"Be honest with both teams and let them negotiate.",score:5,cls:"good",label:"Reasonable",why:"Transparency gives everyone a chance at a fair outcome."},{text:"Take the offer — your career has to come first.",score:-3,cls:"poor",label:"Questionable",why:"Self-interest is understandable but abandoning teammates mid-season breaks trust."},{text:"Take the offer and tell your team last minute.",score:-7,cls:"worst",label:"Harmful",why:"Springing a departure on teammates when it is too late is a betrayal."}]},
  {entity:"Honor Code Officer",icon:"⚖️",flavor:"a peer-elected role nobody wanted until it had consequences",situation:"You catch a student about to graduate cheating on a final. Reporting prevents their graduation.",options:[{text:"Report it — the code applies to everyone regardless of timing.",score:10,cls:"best",label:"Principled",why:"Consistency is the only thing that makes an honour code meaningful."},{text:"Report but formally advocate for a lesser sanction given the timing.",score:5,cls:"good",label:"Reasonable",why:"Upholds the code while arguing for proportionate consequences."},{text:"Warn them privately and let them resubmit.",score:-3,cls:"poor",label:"Questionable",why:"A private warning without consequences is not enforcement."},{text:"Look the other way — ruining a graduation is too harsh.",score:-7,cls:"worst",label:"Harmful",why:"Mercy for one you would deny to others is not mercy — it is favouritism."}]},
  {entity:"Prestige SAT Prep",icon:"🏫",flavor:"sells the dream of elite college at an uncomfortable price",situation:"A prep company guarantees a 200-point score increase. You suspect their methods are borderline fraudulent.",options:[{text:"Investigate before paying — ask for details on their methods.",score:10,cls:"best",label:"Principled",why:"Due diligence before committing money and trust is basic ethical practice."},{text:"Try it and report them if the methods turn out to be wrong.",score:5,cls:"good",label:"Reasonable",why:"Gives them a chance but puts you at risk of benefiting from cheating."},{text:"Use them and keep your suspicions to yourself.",score:-3,cls:"poor",label:"Questionable",why:"Benefiting from likely misconduct while staying silent makes you complicit."},{text:"Sign up — results matter more than methods.",score:-7,cls:"worst",label:"Harmful",why:"Wilful ignorance about potential cheating is not innocence."}]},
  {entity:"Equity Alliance",icon:"✊",flavor:"fights for fairness and occasionally among themselves",situation:"Your club receives a large grant with conditions that restrict what topics you can address.",options:[{text:"Decline — your independence is worth more than the funding.",score:10,cls:"best",label:"Principled",why:"An advocacy group that accepts conditions on its advocacy has surrendered its purpose."},{text:"Accept only if the conditions can be fully negotiated away.",score:5,cls:"good",label:"Reasonable",why:"Tests whether the funder is flexible before walking away."},{text:"Accept and comply fully — the money enables other good work.",score:-3,cls:"poor",label:"Questionable",why:"A silenced advocacy group is no longer an advocacy group."},{text:"Accept and quietly work around the conditions.",score:-7,cls:"worst",label:"Harmful",why:"Accepting a contract you plan to violate is dishonest."}]},
  {entity:"Unsigned Band",icon:"🎵",flavor:"three years of grinding and one offer that feels like a trap",situation:"Your bandmate wrote most of your best songs but wants equal credit split. You are the face who drives the success.",options:[{text:"Credit should reflect contribution — negotiate an honest split.",score:10,cls:"best",label:"Principled",why:"Fame and creative contribution are different things. Both deserve recognition."},{text:"Agree to equal split — band unity matters more than perfect accuracy.",score:5,cls:"good",label:"Reasonable",why:"Pragmatic and keeps the band together even if not precisely fair."},{text:"Take majority credit — your promotion made it successful.",score:-3,cls:"poor",label:"Questionable",why:"Promotion is valuable but does not justify claiming credit for songs you did not write."},{text:"Cut them out and claim sole credit.",score:-7,cls:"worst",label:"Harmful",why:"Taking credit for others' creative work is theft."}]},
  {entity:"Street Art Collective",icon:"🎨",flavor:"creates beauty illegally and debates whether that matters",situation:"A piece your collective painted is being sold as an NFT by someone who photographed it without permission.",options:[{text:"Claim ownership publicly and request the NFT be taken down.",score:10,cls:"best",label:"Principled",why:"Artists have a right to control how their work is commercialised."},{text:"Consult a lawyer about your options before acting.",score:5,cls:"good",label:"Reasonable",why:"Explores your actual rights before making claims."},{text:"Let it go — street art is public by nature.",score:-3,cls:"poor",label:"Questionable",why:"Public display does not grant permission for commercial exploitation."},{text:"Immediately sell your own NFT of the same piece to compete.",score:-7,cls:"worst",label:"Harmful",why:"Escalating into a commercial race rather than addressing the theft."}]},
  {entity:"Study Group App",icon:"📱",flavor:"designed for collaboration, mostly used to share answers",situation:"A bug in the app you built gives you access to other users' private notes. You have not looked yet.",options:[{text:"Report the bug immediately and do not look at anything.",score:10,cls:"best",label:"Principled",why:"The ethical obligation is clear the moment you discover the access."},{text:"Fix it, document it, and notify affected users.",score:5,cls:"good",label:"Reasonable",why:"Responsible disclosure that respects user trust."},{text:"Fix it quietly and tell no one.",score:-3,cls:"poor",label:"Questionable",why:"Users deserved to know they were exposed, even after an honest fix."},{text:"Look at a few notes just to understand the scope.",score:-7,cls:"worst",label:"Harmful",why:"Curiosity does not justify accessing private information you are not authorised to see."}]},
